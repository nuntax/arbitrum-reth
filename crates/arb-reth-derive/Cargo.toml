[package]
name = "arb-reth-derive"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

# Stage F: L1 inbox derivation. Decodes SequencerInbox batches (blob + calldata)
# into the canonical MessageWithMetadata stream (the half arbitrum-reth lacks).
# Pure offline decoder (no network I/O). See docs/stage-f-handoff.md.

[dependencies]
# Arbitrum message types from arb-alloy; alloy version unifies with reth's workspace.
arb-sequencer-network = { git = "https://github.com/nuntax/arb-alloy", rev = "6862abe361cc1b4d7c1dddee1550a6bb34158d3b", default-features = false, features = ["std"] }
alloy-primitives = "1"
alloy-rlp = { workspace = true }
# brotli is re-exported from arb_revm (which vendors it) so both crates share one brotli
# source and avoid a lockfile collision. BUSL-licensed; see the arb_revm NOTICE.
arb-revm = { git = "https://github.com/nuntax/arb-revm", rev = "d3b2517e4c8a9422004f5ebf6c746c669f5f0c6f" }

[dev-dependencies]
serde_json = { workspace = true }
