[package]
name = "arb-reth-derive"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

# Stage F: L1 inbox derivation. Decodes SequencerInbox batches (blob + calldata)
# into the canonical MessageWithMetadata stream (the half arbitrum-reth lacks).
# Pure offline decoder (no network I/O). See docs/stage-f-handoff.md.

[dependencies]
# Arbitrum message types from arb-alloy; alloy version unifies with reth's workspace.
arb-sequencer-network = { path = "../../../arb-alloy/crates/sequencer-network", default-features = false, features = ["std"] }
alloy-primitives = "1"
alloy-rlp = { workspace = true }
# C brotli from Nitro; `cc_brotli` builds from source for decompression parity.
brotli = { path = "../../../nitro/crates/brotli", features = ["cc_brotli"] }

[dev-dependencies]
serde_json = { workspace = true }
