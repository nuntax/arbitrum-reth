[package]
name = "arb-reth-genesis"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

# Stage H: convert the Nitro classic-state export into a reth-readable genesis by reproducing
# Nitro's `InitializeArbosInDatabase` (via arb_revm::arbos_init) and verifying the state root.

[dependencies]
arb-revm = { git = "https://github.com/nuntax/arbitrum-revm", rev = "95a9078789e0bdf37de2c1b686e5556b7f92af22" }

alloy-primitives = { version = "1", default-features = false }
alloy-trie = { version = "0.9", default-features = false }
eyre = "0.6.12"
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { workspace = true }

[[bin]]
name = "arb-genesis-import"
path = "src/bin/arb_genesis_import.rs"

[[bin]]
name = "verify-export"
path = "src/bin/verify_export.rs"

[dev-dependencies]
