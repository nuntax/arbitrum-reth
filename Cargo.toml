[workspace]
members = ["crates/*"]
resolver = "2"

# arbitrum-reth — the reth-side of the stack: Arbitrum/ArbOS execution wired into reth's EVM,
# block-executor and ConfigureEvm extension points (arb-reth-evm), and trustless L1-inbox
# derivation (arb-reth-derive). The execution engine itself lives in the sibling `arb_revm`
# workspace (pure revm/ArbOS, no reth deps); this workspace path-depends on it.

[workspace.package]
authors = ["nun"]
edition = "2024"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
# Pinned to match arb_revm's workspace so revm 36 unifies across the path dep on arb-revm.
revm = { version = "36.0.0", features = ["optional_priority_fee_check", "optional_balance_check", "optional_eip7623"] }
alloy-rlp = "0.3.12"
serde_json = "1.0.145"
